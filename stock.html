  <!-- STOCK REGISTRATION FORM -->

  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4><i class="bi bi-plus-square"></i> Stock Registration</h4>
      </div>

      <div class="card-body">
        <form>
          <h5 class="mb-3">Item Information</h5>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Item Name</label>
              <input type="text" class="form-control" />
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Product Code</label>
              <input type="text" class="form-control" />
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Category</label>
              <select class="form-select">
                <option>Select Category</option>
                <option>Electronics</option>
                <option>Furniture</option>
                <option>Food</option>
                <option>Clothing</option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Date Received</label>
              <input type="date" class="form-control" />
            </div>
          </div>

          <h5 class="mt-4 mb-3">Stock Quantity</h5>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Quantity</label>
              <input type="number" class="form-control" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Unit</label>
              <select class="form-select">
                <option>Pieces</option>
                <option>Boxes</option>
                <option>Kilograms</option>
                <option>Litres</option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Price per Unit</label>
              <input type="number" class="form-control" />
            </div>
          </div>

          <h5 class="mt-4 mb-3">Supplier Details</h5>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Supplier Name</label>
              <input type="text" class="form-control" />
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Supplier Contact</label>
              <input type="text" class="form-control" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Supplier Address</label>
            <textarea class="form-control"></textarea>
          </div>

          <h5 class="mt-4 mb-3">Storage Information</h5>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Warehouse</label>
              <input type="text" class="form-control" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Shelf Number</label>
              <input type="text" class="form-control" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Expiry Date</label>
              <input type="date" class="form-control" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Upload Invoice</label>
            <input type="file" class="form-control" />
          </div>

          <div class="mt-4">
            <button class="btn btn-success">
              <i class="bi bi-check-circle"></i> Register Stock
            </button>

            <button type="reset" class="btn btn-secondary">
              <i class="bi bi-arrow-clockwise"></i> Reset
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
